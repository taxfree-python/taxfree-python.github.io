-
  id: "layerx-ai-workforce-intern"
  title: "LayerX Ai Workforce R&D インターン"
  period:
    start:
      year: 2026
      month: 1
    end:
      year: 2026
      month: 5
  description: "Agentic なサービスにおける「UI のラストワンマイル」を LLM で埋める R&D に従事。Google 主導の宣言的 UI 生成プロトコル A2UI を基盤に、ユーザーの自然言語指示から業務目的に応じた UI を動的生成する仕組みを設計・実装。成果は社外イベントで[発表した](https://speakerdeck.com/taxfree_python/r-and-d-uinorasutowanmairuwollmdemai-meru)。"
  skills:
    - "Python"
    - "LLM"
    - "AI Agents"
    - "Generative UI"
  category: "work"
  featured: true
  detailedDescription: "Agentic で動的・多目的なサービスでは全ユーザーに同一 UI を提供する「one size fits all」が限界を迎えるという課題に対し、ユーザーが業務目的ごとに UI をカスタマイズできる体験を「UI のラストワンマイルを LLM で埋める」というコンセプトで提案・検証。Google 主導の宣言的 UI 生成プロトコル A2UI を基盤に採用し、信頼できるコンポーネント群 (catalog/inventory) の範囲内で LLM が UI を JSON として生成する仕組みを構築。任意コードを実行しない宣言的生成により「壊れない UI」を担保しつつ、生成時は LLM でテンプレート UI を作り、利用時はテンプレートにデータを注入してレンダリングする「テンプレートとデータの分離」設計で、レイテンシと安定性を両立した。A2UI 公式実装に不足していた複数 LLM プロバイダ対応・マルチターン会話・UI 定義の JSON export/import を自前で実装。さらに与えられた inventory で UI を構成可能かを判定する境界検出を導入し、無理な更新の抑制とユーザーへのフィードバック・inventory 拡張の根拠付けに活用。スライド検索を題材に、自然言語による段階的なレイアウト・表示項目・プロパティの変更が可能なことを検証した。"
  achievements:
    - "「UI のラストワンマイルを LLM で埋める」コンセプトの提案と検証"
    - "A2UI (宣言的 UI 生成プロトコル) を基盤とした UI 動的生成基盤の設計・実装"
    - "複数 LLM プロバイダ対応・マルチターン会話・JSON export/import など公式未対応機能の自前実装"
    - "inventory 境界検出による安全な UI 更新とフィードバックループの構築"
    - "成果を社外イベント「LayerX の向き合う R&D 課題」で発表"
  links:
    -
      label: "R&D_UI のラストワンマイルを LLM で埋める (発表スライド)"
      url: "https://speakerdeck.com/taxfree_python/r-and-d-uinorasutowanmairuwollmdemai-meru"
