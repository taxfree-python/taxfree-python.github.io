  description: "「動的手法による Agent Workflow 自動生成」をテーマに、多様なタスクを解く Agent Workflow を動的に自動生成するメタエージェントの実装に取り組んだ。木探索ベースの手法を検証し、ベースライン比 +3.5〜+25.0 ポイントの精度改善を達成。成果は[LayerX 技術ブログ](https://tech.layerx.co.jp/entry/2025/11/05/00)で紹介された。"
  skills:
    - "LLM"
