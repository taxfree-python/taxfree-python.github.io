  detailedDescription: "Dry team leaderとしてプロジェクトの設計・実装を担当。実際の感染データを用いてserotype別のデング熱流行予測モデルを構築し、Lasso/LSTMを用いた時系列データの解析と予測を実施。気候パラメータの寄与分析を行い、先行研究との比較を実施。Webカメラの画像データから特定の色を定量するプログラムも開発しました。パリでの国際大会で英語によるプレゼンテーションと質疑応答を担当しました。"
