  category: "work"
  detailedDescription: "個別の Agent Workflow 開発には膨大な工数がかかるという課題に対し、「多様なタスクを解く Agent Workflow を動的に自動生成するメタエージェント」の実装に取り組んだ。AdaptFlow (Adaptive Workflow Optimization via Meta-Learning)、AFlow (Automating Agentic Workflow Generation)、Multi-Agent Architecture Search via Agentic Supernet などの研究をベースに、木探索ベースで Agent Workflow を自動生成する手法を検証し、LLM 単体をベースラインとして比較する設計を構築。実装過程で数量形式 QA タスクの精度が上がらない問題を発見し、LLM の品質評価・サンプル数チューニング・QA 種別分類などの仮説検証を通じて計 5 点の根本原因分析を実施。結果としてベースライン比 +3.5〜+25.0 ポイントの精度改善を達成した。"
  achievements:
